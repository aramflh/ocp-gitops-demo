# Argo CD Application: live demo app (running at start of demo)
# Apply with: oc apply -f application-app1.yaml
# Update repoURL to your Git repo before applying.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-live
  namespace: openshift-gitops
spec:
  destination:
    server: "https://kubernetes.default.svc"
  project: default
  source:
    directory:
      recurse: true
    path: apps/app1
    repoURL: https://github.com/YOUR_ORG/ocp-gitops-demo.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 20
