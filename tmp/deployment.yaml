apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: gitops-demo-empty
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: registry.access.redhat.com/ubi8/httpd-24
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
